<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Registro · fAIght</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body class="auth">
    <main class="auth-card">
        <h1>Crear usuario</h1>
        <p class="muted">Crea una cuenta para el panel del club.</p>
        {% if error %}
        <div class="alert error">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ url_for('register_post') }}" class="stack">
            <input type="hidden" name="next" value="{{ next or '/' }}" />
            <label>
                Usuario
                <input name="username" autocomplete="username" minlength="3" required />
            </label>
            <label>
                Contraseña
                <input name="password" type="password" autocomplete="new-password" minlength="6" required />
            </label>
            <button type="submit">Crear cuenta</button>
        </form>
      <div class="actions">
        <a class="btn ghost" href="{{ url_for('login', next=next) }}">Inicio de sesión</a>
      </div>
    </main>
</body>
